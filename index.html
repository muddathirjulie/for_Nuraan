<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Nuraan 🤍</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
font-family:"Playfair Display", serif;
background:linear-gradient(180deg,#fff4f8,#ffdce8,#ffc8dc);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

.card{
background:white;
padding:60px 50px;
border-radius:28px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
max-width:600px;
}

h1{
font-family:"Great Vibes", cursive;
font-size:64px;
color:#a4123a;
margin-bottom:20px;
}

p{
font-size:18px;
line-height:1.8;
min-height:32px;
}

.question{
font-size:24px;
margin-top:20px;
color:#851133;
font-style:italic;
}

.buttons{
margin-top:30px;
display:none;
gap:15px;
justify-content:center;
}

button{
padding:14px 28px;
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;
font-family:"Playfair Display";
}

.yes{
background:#851133;
color:white;
}

.ofcourse{
background:#f6f6f6;
}

button:hover{
transform:translateY(-2px);
}

</style>
</head>

<body>

<div class="card">

<h1>Nuraan</h1>

<p id="t1"></p>
<p id="t2"></p>
<p id="t3"></p>

<div class="question" id="q"></div>

<div class="buttons" id="buttons">

<button class="yes" onclick="yes()">Yes 🤍</button>

<button class="ofcourse" onclick="ofcourse()">Of course 💗</button>

</div>

</div>

<script>

const lines = [
{ text:"I didn’t want to ask you this in a random way.", el:"t1"},
{ text:"I really love spending time with you — every conversation, every laugh, and every moment with you feels easy and genuine.", el:"t2"},
{ text:"You’ve become someone I care about deeply, and I wanted to ask you this properly.", el:"t3"},
{ text:"Nuraan, will you be my girlfriend?", el:"q"}
]

let line = 0
let char = 0

function type(){

if(line >= lines.length){
document.getElementById("buttons").style.display="flex"
return
}

let element = document.getElementById(lines[line].el)
let text = lines[line].text

if(char < text.length){
element.textContent += text[char]
char++
setTimeout(type,35)
}
else{
line++
char=0
setTimeout(type,500)
}

}

type()

function yes(){
window.location.href="yes.html"
}

function ofcourse(){
window.location.href="ofcourse.html"
}

</script>

</body>
</html>
