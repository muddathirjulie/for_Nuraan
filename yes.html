<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You Said Yes 🤍</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-1:#fff5f8;
      --bg-2:#ffdce8;
      --bg-3:#f4b6c2;
      --card-top:#fff9fb;
      --card-bottom:#ffe9ef;
      --text:#5a3a42;
      --heading:#8a0f2e;
      --accent:#b1123a;
      --shadow:0 30px 80px rgba(95, 16, 43, 0.22);
      --radius:36px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html, body{
      min-height:100%;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.9), transparent 30%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:"Playfair Display", serif;
      overflow:hidden;
      position:relative;
      padding:24px;
    }

    .floating-layer{
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
    }

    body::after{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at center, transparent 60%, rgba(62, 6, 21, 0.16));
      pointer-events:none;
      z-index:1;
    }

    .float{
      position:absolute;
      bottom:-40px;
      width:18px;
      height:18px;
      transform:rotate(45deg);
      opacity:0.24;
      animation:floatUp linear infinite;
      filter:drop-shadow(0 0 8px rgba(120,0,30,0.24));
    }

    .float::before,
    .float::after{
      content:"";
      position:absolute;
      width:18px;
      height:18px;
      background:inherit;
      border-radius:50%;
    }

    .float::before{
      top:-9px;
      left:0;
    }

    .float::after{
      left:-9px;
      top:0;
    }

    @keyframes floatUp{
      0%{
        transform:translateY(0) translateX(0) rotate(45deg) scale(var(--scale));
        opacity:0;
      }
      18%{
        opacity:0.34;
      }
      100%{
        transform:translateY(-120vh) translateX(var(--drift)) rotate(405deg) scale(var(--scale));
        opacity:0;
      }
    }

    .card{
      position:relative;
      z-index:2;
      width:min(92%, 620px);
      padding:72px 54px 56px;
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(255,249,251,0.96), rgba(255,233,239,0.96));
      border:1px solid rgba(255,255,255,0.65);
      backdrop-filter:blur(8px);
      box-shadow:var(--shadow);
      text-align:center;
      overflow:hidden;
      opacity:0;
      transform:translateY(24px);
      animation:fadeUp 1.2s ease forwards, floatCard 7s ease-in-out 1.3s infinite;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,0.5), transparent 45%, rgba(255,214,229,0.22));
      pointer-events:none;
    }

    .card::after{
      content:"";
      position:absolute;
      inset:-16px;
      border-radius:48px;
      background:linear-gradient(120deg, rgba(255,214,229,0.65), rgba(255,255,255,0.9));
      opacity:0.24;
      filter:blur(30px);
      z-index:-1;
    }

    @keyframes fadeUp{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes floatCard{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-10px);
      }
    }

    .eyebrow{
      display:inline-block;
      margin-bottom:14px;
      text-transform:uppercase;
      letter-spacing:0.16em;
      font-size:0.72rem;
      color:rgba(138,15,46,0.7);
    }

    h1{
      font-family:"Great Vibes", cursive;
      font-size:clamp(3rem, 6vw, 4.5rem);
      color:var(--heading);
      margin-bottom:18px;
      line-height:1.05;
    }

    .divider{
      width:88px;
      height:1px;
      margin:0 auto 26px;
      background:linear-gradient(90deg, transparent, rgba(138,15,46,0.65), transparent);
    }

    p{
      font-size:1.14rem;
      color:var(--text);
      line-height:1.95;
      min-height:6.2em;
    }

    .footer-note{
      margin-top:24px;
      font-size:0.95rem;
      color:rgba(90,58,66,0.78);
    }

    .status{
      margin-top:14px;
      min-height:22px;
      font-size:0.92rem;
      color:rgba(90,58,66,0.72);
    }

    @media (max-width: 640px){
      body{
        padding:18px;
      }

      .card{
        width:100%;
        padding:48px 24px 38px;
        border-radius:28px;
      }

      p{
        font-size:1.02rem;
        line-height:1.85;
        min-height:7em;
      }
    }

    @media (prefers-reduced-motion: reduce){
      .float,
      .card{
        animation:none !important;
      }
    }
  </style>
</head>
<body>

  <div class="floating-layer" id="floatingLayer"></div>

  <div class="card">
    <div class="eyebrow">A beautiful answer</div>
    <h1>You said yes 🤍</h1>
    <div class="divider"></div>
    <p id="message"></p>
    <div class="status" id="status" aria-live="polite"></div>
    <div class="footer-note">This moment just became even more special to me.</div>
  </div>

  <script>
    const reds = ["#8a0f2e", "#b1123a", "#d62857", "#cc406d"];
    const layer = document.getElementById("floatingLayer");

    for (let i = 0; i < 20; i++) {
      const heart = document.createElement("div");
      heart.className = "float";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.background = reds[Math.floor(Math.random() * reds.length)];
      heart.style.animationDuration = (Math.random() * 10 + 14) + "s";
      heart.style.opacity = (Math.random() * 0.18 + 0.14).toFixed(2);
      heart.style.setProperty("--scale", (Math.random() * 0.45 + 0.75).toFixed(2));
      heart.style.setProperty("--drift", (Math.random() * 70 - 35).toFixed(0) + "px");
      layer.appendChild(heart);
    }

    const text = "That genuinely means more to me than you know. I love spending time with you, and the thought of building something real with you makes me so happy. Thank you for saying yes.";
    const el = document.getElementById("message");
    const statusEl = document.getElementById("status");

    let i = 0;

    function type() {
      if (i < text.length) {
        el.textContent += text.charAt(i++);
        setTimeout(type, 34);
      }
    }

    type();

    function sendAnswer() {
      const payload = {
        answer: "Yes 🤍",
        page: "yes.html",
        timestamp: new Date().toISOString(),
        source: "proposal response"
      };

      const endpoint = "https://formspree.io/f/xnjjowzp";

      try {
        const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
        if (navigator.sendBeacon) {
          navigator.sendBeacon(endpoint, blob);
          statusEl.textContent = "Saved.";
          return;
        }
      } catch (error) {
        console.warn("sendBeacon failed:", error);
      }

      fetch(endpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify(payload),
        mode: "cors",
        keepalive: true
      })
      .then(() => {
        statusEl.textContent = "Saved.";
      })
      .catch((error) => {
        console.warn("Formspree submission failed:", error);
        statusEl.textContent = "";
      });
    }

    window.addEventListener("load", sendAnswer, { once: true });
  </script>

</body>
</html>
